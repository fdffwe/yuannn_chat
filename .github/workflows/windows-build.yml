name: Windows Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4 # 升级到 v4
        with:
          submodules: recursive

      - name: 2. 安装 Qt 环境
        uses: jurplel/install-qt-action@v3 # 这个插件目前 v3 是稳定的，不用动
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          install-deps: 'true'

      - name: 3. 安装依赖 (vcpkg)
        run: |
          vcpkg install boost-asio:x64-windows
          vcpkg install protobuf:x64-windows
          vcpkg install grpc:x64-windows
          vcpkg install nlohmann-json:x64-windows

      - name: 4. 配置与编译
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -G "Visual Studio 17 2022" -A x64
          cmake --build . --config Release

      - name: 5. 提取并打包 (windeployqt)
        shell: pwsh
        run: |
          cd build/Release
          # 确保这里的可执行文件名和你的项目生成的一致
          windeployqt LLFC_Chat.exe 
          Compress-Archive -Path * -DestinationPath ../../LLFC_Chat_Windows.zip

      - name: 6. 上传结果 (Artifacts)
        uses: actions/upload-artifact@v4 # 【核心修改】这里必须是 v4
        with:
          name: LLFC_Chat_Windows_Package
          path: LLFC_Chat_Windows.zip
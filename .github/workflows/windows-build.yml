name: YUANNN-Chat Windows Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 2. 安装 Qt 环境
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          install-deps: 'true'

      - name: 3. 安装依赖 (vcpkg)
        run: |
          vcpkg install boost-system:x64-windows boost-filesystem:x64-windows

      - name: 4. 配置与编译
        shell: pwsh
        run: |
          mkdir build_tmp
          cd build_tmp
          # 确保指向 client 文件夹
          cmake ../client -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -G "Visual Studio 17 2022" -A x64
          cmake --build . --config Release

      - name: 5. 提取依赖并打包 (windeployqt)
        shell: pwsh
        run: |
          # 根据你的 CMakeLists.txt，生成路径被强制改到了 client/build/bin
          # 这里的 Release 是 CMake 自动创建的子目录
          cd client/build/bin/Release
          
          echo "Checking directory: $(Get-Location)"
          ls
          
          # 运行打包工具。注意：你的项目在 CMake 里叫 wechat
          windeployqt wechat.exe
          
          # 压缩生成的结果
          Compress-Archive -Path * -DestinationPath ../../../../YUANNN_Chat_Windows.zip

      - name: 6. 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: YUANNN-Chat-Windows-Package
          path: YUANNN_Chat_Windows.zip